name: Android APK 


on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
                with:
                    python-version: '3.12'

            - name: Install OS packages
                run: |
                    sudo apt-get update
                    sudo apt-get install -y git zip unzip openjdk-17-jdk python3-dev python3-pip build-essential zlib1g-dev libssl-dev libsqlite3-dev

            - name: Install Buildozer
                run: |
                    python -m pip install --upgrade pip wheel setuptools
                    python -m pip install buildozer cython==0.29.36

            - name: Setup Android SDK
                uses: r0adkll/setup-android@v2
                with:
                    api-level: 31
                    build-tools: 31.0.0
                    ndk: 25.1.8937393
                    cache: true

            - name: Create buildozer.spec if missing
                run: |
                    if [ ! -f buildozer.spec ]; then
                        cat > buildozer.spec <<'EOF'
[app]
title = Unicornio 360
package.name = unicornio360
package.domain = org.example
source.dir = .
source.include_exts = py,kv
orientation = portrait
fullscreen = 0
requirements = python3,kivy
android.arch = armeabi-v7a
android.api = 31
android.minapi = 21
android.permissions = INTERNET

[buildozer]
log_level = 2
warn_on_root = 1
EOF
                    fi

            - name: Build Android debug APK
                run: |
                    buildozer android debug

            - name: Upload APK artifact
                uses: actions/upload-artifact@v4
                with:
                    name: unicornio-apk
                    path: bin/*.apk